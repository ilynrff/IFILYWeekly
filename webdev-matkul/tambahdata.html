<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tambah Data | INFORMATIKA 2026</title>
</head>

<body>

    <div align="center">

        <h2>Tambah Data Mahasiswa</h2>

        <form action="mahasiswa.html" method="post">
            <table>
                <tr>
                    <td>Nama</td>
                    <td>:</td>
                    <td><input type="text" name="nama" placeholder="Nama" required></td>
                </tr>
                <tr>
                    <td>Foto</td>
                    <td>:</td>
                    <td><input type="file" name="foto" required></td>
                </tr>
                <tr>
                    <td>NIM</td>
                    <td>:</td>
                    <td><input type="text" name="nim" placeholder="NIM" required></td>
                </tr>
                <tr>
                    <td>Prodi</td>
                    <td>:</td>
                    <td><input type="text" name="jurusan" placeholder="Prodi" required></td>
                </tr>
                <tr>
                    <td colspan="3" align="center">
                        <button type="submit" name="submit" style="border-radius: 5px;">Tambah</button>
                    </td>
                </tr>
            </table>
        </form>

        <br>

        <a href="mahasiswa.html">
            <button style="border-radius: 5px;">Back</button>
        </a>

    </div>

</body>

</html>
